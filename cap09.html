function pt(lat,lon,label,color,dir,off){
  dir=dir||'top'; off=off||[0,-8];
  return L.circleMarker([lat,lon],{radius:7,fillColor:'white',color:color,weight:2.5,fillOpacity:1})
    .bindTooltip(label,{permanent:true,direction:dir,className:'tt',offset:off})
    .bindPopup('<b style="font-family:Georgia">'+label.replace(/\n/g,'<br>')+'</b>',{closeButton:false});
}
function ptStar(lat,lon,label,color){
  return L.circleMarker([lat,lon],{radius:10,fillColor:color,color:'white',weight:2,fillOpacity:1})
    .bindTooltip(label,{permanent:true,direction:'top',className:'tt',offset:[0,-13]})

}
function km(lat,lon,text,color){
  return L.marker([lat,lon],{
    icon:L.divIcon({
      className:'',
      html:'<div style="display:inline-block;transform:translate(-50%,-50%);background:#ffffff;border:2.5px solid '+color+';border-radius:5px;padding:4px 10px;font-family:Georgia,serif;font-size:12px;color:'+color+';font-style:italic;font-weight:bold;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.5);">'+text+'</div>',
